  <style>
    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      z-index: 99999;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1),
        visibility 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #initial-loader.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-logo {
      width: 114px;
      height: 114px;
      object-fit: contain;
      animation: loader-breathe 2s ease-in-out infinite;
    }

    @keyframes loader-breathe {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.7;
      }

      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <!-- Loading Overlay — lives OUTSIDE #app so React won't destroy it -->
  <div id="initial-loader">
    <img class="loader-logo" src="/logo.svg" alt="Public Gold" />
  </div>

  <!-- React app root -->
  <div id="app"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
