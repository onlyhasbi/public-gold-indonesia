  <style>
    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      z-index: 99999;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1),
        visibility 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #initial-loader.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #initial-loader.fade-out .circle-spinner {
      display: none;
    }

    .circle-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #fecaca;
      border-top-color: #dc2626;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <!-- Loading Overlay — lives OUTSIDE #app so React won't destroy it -->
  <div id="initial-loader">
    <div class="circle-spinner"></div>
  </div>

  <!-- React app root -->
  <div id="app"></div>
