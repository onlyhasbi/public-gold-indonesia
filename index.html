    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #f8fafc; /* match slate-50 */
        z-index: 9999;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f1f5f9; /* slate-100 */
        border-top-color: #dc2626; /* red-600 */
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loader-text {
        color: #334155; /* slate-700 */
        font-weight: 500;
      }
    </style>
